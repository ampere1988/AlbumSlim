name: AlbumSlim
options:
  bundleIdPrefix: com.hao.doushan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.3"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: "74H37MDT83"
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  AlbumSlim:
    type: application
    platform: iOS
    sources:
      - path: AlbumSlim
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hao.doushan
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: "相册瘦身"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "相册瘦身需要访问您的照片库来分析和管理照片视频，所有处理均在本地完成。"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "相册瘦身需要保存压缩后的视频到您的照片库。"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: AlbumSlim/AlbumSlim.entitlements
    info:
      path: AlbumSlim/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers:
          - com.hao.doushan.analysis
        UIBackgroundModes:
          - processing
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    dependencies: []
